name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: gofmt
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      # Steiner is cgo-free by design (pure-Go SQLite), so the race detector
      # (which needs cgo) runs on Linux, where it is reliable. Windows runs the
      # plain suite to guard the cgo-free build and OS-specific paths.
      - name: test (race, Linux)
        if: runner.os == 'Linux'
        run: go test -race ./...
      - name: test (Windows)
        if: runner.os == 'Windows'
        run: go test ./...
